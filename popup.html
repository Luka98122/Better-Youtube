<style>
  body { width: 220px; padding: 15px; font-family: 'Roboto', sans-serif; background: #0f0f0f; color: white; }
  .option { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  input[type="range"] { width: 100%; margin-top: 5px; }
  hr { border: 0; border-top: 1px solid #333; margin: 15px 0; }
</style>

<h3>Better YouTube</h3>
<div class="option">
  <label>Blur Intensity</label>
  <span id="val">20</span>px
</div>
<input type="range" id="blurRange" min="0" max="100" value="20">

<hr>

<div class="option">
  <label>Hide Home Feed</label>
  <input type="checkbox" id="hideHome">
</div>
<div class="option">
  <label>Hide Sidebar Recs</label>
  <input type="checkbox" id="hideSidebar">
</div>
<div class="option">
  <label>Comments in Sidebar</label>
  <input type="checkbox" id="swapComments">
</div>

<script src="popup.js"></script>
