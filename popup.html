<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 220px; 
      padding: 16px; 
      font-family: 'Segoe UI', Roboto, Ubuntu, sans-serif; 
      background-color: #1e1e1e;
      color: #e0e0e0;
      margin: 0;
      border-radius: 8px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 500;
      font-size: 14px;
    }
    #val {
      color: #e95420; /* Sleek orange accent */
      font-weight: bold;
    }
    /* Custom Slider Styling */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type=range]:focus {
      outline: none;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: #3a3a3a;
      border-radius: 3px;
    }
    input[type=range]::-webkit-slider-thumb {
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #e95420;
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -5px;
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <label>Blur Intensity</label>
    <span><span id="val">20</span>px</span>
  </div>
  <input type="range" id="blurRange" min="0" max="100" value="20">
  <script src="popup.js"></script>
</body>
</html>
